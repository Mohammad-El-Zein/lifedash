services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lifedash
      POSTGRES_PASSWORD: lifedash
      POSTGRES_DB: lifedash
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifedash"]
      interval: 5s
      timeout: 5s
      retries: 10

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    # skipApiVersionCheck: the pinned SDK may speak a newer API version than the image
    command: azurite-blob --blobHost 0.0.0.0 --blobPort 10000 --location /data --skipApiVersionCheck
    ports:
      - "10000:10000"
    volumes:
      - azurite_data:/data

  backend:
    build: ./backend
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql+psycopg://lifedash:lifedash@db:5432/lifedash
      SECRET_KEY: dev-only-secret-key-change-me-in-production-0000
      ENVIRONMENT: dev
      CORS_ORIGINS: http://localhost:4200
      # Azurite's well-known dev account, reached via the compose network.
      AZURE_STORAGE_CONNECTION_STRING: DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      azurite:
        condition: service_started

  frontend:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm ci && npm start -- --host 0.0.0.0 --port 4200 --proxy-config proxy.conf.json --poll 2000"
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
  azurite_data:
  frontend_node_modules:
