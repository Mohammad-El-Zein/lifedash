name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    name: Backend · lint & tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: pytest -q

  frontend-build:
    name: Frontend · tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test -- --watch=false
      # The production build runs once, in the Docker image build below.

  docker-images:
    name: Docker · build images
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  # Phase 2+: push images to Azure Container Registry and deploy to Container Apps.
  # Requires the AZURE_CREDENTIALS and AZURE_RESOURCE_GROUP repository secrets and
  # the infra from /infra to be deployed first (see infra/README.md).
